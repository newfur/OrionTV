name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    name: Build Android ${{ matrix.variant.name }} APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - id: tv
            name: TV
            prebuild: EXPO_TV=1 EXPO_USE_METRO_WORKSPACE_ROOT=1 yarn prebuild
            apk_name: orionTV-tv
            tag_suffix: tv
          - id: mobile
            name: Mobile
            prebuild: EXPO_USE_METRO_WORKSPACE_ROOT=1 npx expo prebuild --clean
            apk_name: orionTV-mobile
            tag_suffix: mobile
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Prebuild ${{ matrix.variant.name }} App
        run: ${{ matrix.variant.prebuild }}

      - name: Build ${{ matrix.variant.name }} APK
        run: cd android && ./gradlew assembleRelease

      - name: Rename APK file
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/${{ matrix.variant.apk_name }}.${{ steps.package-version.outputs.version }}.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}-${{ matrix.variant.tag_suffix }}
          name: ${{ matrix.variant.name }} Release v${{ steps.package-version.outputs.version }}
          body: Automated ${{ matrix.variant.name }} release for version v${{ steps.package-version.outputs.version }}.
          draft: false
          prerelease: false
          files: artifacts/${{ matrix.variant.apk_name }}.${{ steps.package-version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
